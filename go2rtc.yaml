# go2rtc configuration
# Browser connects directly to go2rtc (no proxy). Ensure ports 1984 and 8555 are reachable.
# https://github.com/blakeblackshear/frigate/tree/master/go2rtc

api:
  listen: ":1984"
  origin: "*"   # CORS: allow browser to POST to /api/webrtc from other origins

webrtc:
  listen: ":8555"
  candidates:
    - 10.0.10.225:8555

streams:
  # Example:
  # front_door: rtsp://user:pass@192.168.1.10:554/stream1
  # garage: rtsp://admin:admin@192.168.1.11:554/cam/realmonitor?channel=1&subtype=0
