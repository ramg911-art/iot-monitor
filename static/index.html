<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/js/nvr.js"></script>
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #e8e8ed;
      --muted: #888;
      --accent: #00d4aa;
      --accent-dim: #00a884;
      --danger: #ff6b6b;
      --success: #51cf66;
      --radius: 8px;
      --font: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.5rem; margin: 0 0 24px; color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent-dim); }
    .card h3 { margin: 0 0 12px; font-size: 1rem; }
    .card .meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
    .card .value { font-size: 1.5rem; color: var(--accent); }
    .toggle-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      margin-top: 8px;
    }
    .toggle-btn.off { background: var(--border); color: var(--text); }
    .toggle-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status.online { background: var(--success); }
    .status.offline { background: var(--danger); }
    .login-form {
      max-width: 320px;
      margin: 80px auto;
      padding: 24px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .login-form input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
    }
    .login-form button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
    }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--muted); }
    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .camera-frame {
      aspect-ratio: 16/9;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .camera-frame iframe { width: 100%; height: 100%; border: none; }
    .chart-container { height: 200px; margin-top: 16px; }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: var(--radius);
      max-width: 480px;
      width: 90%;
    }
    .modal h3 { margin-top: 0; }
    .modal input { width: 100%; padding: 10px; margin: 8px 0; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); }
    .modal .actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal .actions button { flex: 1; padding: 10px; border-radius: var(--radius); border: none; cursor: pointer; font-family: inherit; }
    .modal .actions .primary { background: var(--accent); color: var(--bg); }
    .modal .actions .secondary { background: var(--border); color: var(--text); }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .topbar .user { font-size: 0.85rem; color: var(--muted); }
    .topbar button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-family: inherit; }
    .topbar button:hover { border-color: var(--accent); }
    .nvr-list { margin-top: 12px; }
    .nvr-item { background: var(--bg); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
    .nvr-item h4 { margin: 0 0 12px; font-size: 0.95rem; }
    .nvr-camera-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .nvr-camera-row:last-child { border-bottom: none; }
    .nvr-camera-row .channel-info { display: flex; align-items: center; gap: 8px; }
    .camera-frame .stream-overlay { position: absolute; top: 0; left: 0; right: 0; padding: 8px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); color: #fff; font-size: 0.75rem; pointer-events: none; }
    .camera-frame .stream-overlay.offline { background: rgba(0,0,0,0.85); pointer-events: auto; }
    .camera-frame { position: relative; }
    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; align-items: center; }
    .card-actions .toggle-btn { margin-top: 0; }
    .delete-btn { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 0.75rem; font-family: inherit; }
    .delete-btn:hover { background: var(--danger); color: var(--bg); }
    .door-status { font-size: 1rem; padding: 4px 10px; border-radius: var(--radius); display: inline-block; margin-top: 4px; }
    .door-status.open { background: rgba(255,107,107,0.2); color: var(--danger); }
    .door-status.closed { background: rgba(81,207,102,0.2); color: var(--success); }
    .lan-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
    .lan-badge.lan-online { background: var(--success); color: var(--bg); }
    .lan-badge.lan-cloud { background: #e6a23c; color: var(--bg); }
    .prefer-lan-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); cursor: pointer; margin-left: 8px; }
    .prefer-lan-toggle input { cursor: pointer; }
    .nvr-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .nvr-camera-card { aspect-ratio: 16/9; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
    .nvr-camera-card video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .pagination button { padding: 6px 12px; background: var(--border); border: none; border-radius: var(--radius); color: var(--text); cursor: pointer; font-family: inherit; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination button.active { background: var(--accent); color: var(--bg); }
    .pagination span { color: var(--muted); font-size: 0.85rem; }
    .camera-modal .modal-content { max-width: 900px; }
    .camera-modal video { width: 100%; border-radius: var(--radius); background: #000; }
  </style>
</head>
<body>
  <div id="login-screen" class="login-form">
    <h2>IoT Monitor</h2>
    <input type="text" id="login-user" placeholder="Username" value="admin">
    <input type="password" id="login-pass" placeholder="Password">
    <button id="login-btn">Sign in</button>
    <p id="login-err" style="color:var(--danger);font-size:0.85rem;margin-top:12px;display:none"></p>
  </div>

  <div id="app" style="display:none">
    <div class="container">
      <div class="topbar">
        <h1>IoT Monitor</h1>
        <div>
          <span class="user">Connected</span>
          <button id="logout-btn">Logout</button>
        </div>
      </div>

      <div class="section">
        <h2>Cameras</h2>
        <div id="nvr-cameras-grid" class="nvr-grid"></div>
        <div id="camera-pagination" class="pagination"></div>
      </div>

      <div class="section">
        <h2>Tapo Sensors & Switches</h2>
        <button id="tapo-add" style="margin-bottom:12px;padding:8px 16px;background:var(--border);border:none;border-radius:var(--radius);color:var(--text);cursor:pointer;font-family:inherit">+ Add WiFi Switch by IP</button>
        <div id="tapo-grid" class="grid"></div>
      </div>

      <div class="section">
        <h2>Dahua NVR</h2>
        <button id="nvr-add" style="margin-bottom:12px;padding:8px 16px;background:var(--border);border:none;border-radius:var(--radius);color:var(--text);cursor:pointer;font-family:inherit">+ Add Dahua NVR</button>
        <div id="nvr-list" class="nvr-list"></div>
      </div>

      <div class="section">
        <h2>eWeLink Devices</h2>
        <button id="ewelink-connect" style="margin-right:8px;margin-bottom:12px;padding:8px 16px;background:var(--border);border:none;border-radius:var(--radius);color:var(--text);cursor:pointer;font-family:inherit">Connect eWeLink</button>
        <button id="ewelink-sync" style="margin-right:8px;margin-bottom:12px;padding:8px 16px;background:var(--border);border:none;border-radius:var(--radius);color:var(--text);cursor:pointer;font-family:inherit">Sync eWeLink</button>
        <button id="ewelink-scan-lan" style="margin-bottom:12px;padding:8px 16px;background:var(--border);border:none;border-radius:var(--radius);color:var(--text);cursor:pointer;font-family:inherit">Scan LAN for Sonoff Devices</button>
        <div id="ewelink-grid" class="grid"></div>
      </div>
    </div>
  </div>

  <div id="tapo-add-modal" class="modal">
    <div class="modal-content">
      <h3>Add Tapo WiFi Switch</h3>
      <input id="tapo-ip" type="text" placeholder="IP address (e.g. 192.168.1.100)">
      <input id="tapo-name" type="text" placeholder="Name (optional)">
      <div class="actions">
        <button class="primary" id="tapo-add-save">Add</button>
        <button class="secondary" onclick="document.getElementById('tapo-add-modal').classList.remove('open')">Cancel</button>
      </div>
      <p id="tapo-add-err" style="color:var(--danger);font-size:0.85rem;margin-top:8px;display:none"></p>
    </div>
  </div>

  <div id="nvr-add-modal" class="modal">
    <div class="modal-content">
      <h3>Add NVR</h3>
      <input id="nvr-name" type="text" placeholder="Name (e.g. Living Room NVR)">
      <input id="nvr-ip" type="text" placeholder="IP address (e.g. 192.168.1.50)">
      <input id="nvr-username" type="text" placeholder="Username">
      <input id="nvr-password" type="password" placeholder="Password">
      <input id="nvr-channels" type="number" placeholder="Total channels (1-32)" value="4" min="1" max="32">
      <div class="actions">
        <button class="primary" id="nvr-add-save">Add</button>
        <button class="secondary" onclick="document.getElementById('nvr-add-modal').classList.remove('open')">Cancel</button>
      </div>
      <p id="nvr-add-err" style="color:var(--danger);font-size:0.85rem;margin-top:8px;display:none"></p>
    </div>
  </div>

  <div id="camera-modal" class="modal camera-modal">
    <div class="modal-content">
      <h3 id="camera-modal-title">Camera</h3>
      <div class="camera-modal-video-wrap" style="position:relative;background:#000;border-radius:var(--radius);min-height:200px">
        <video id="camera-modal-video" controls muted autoplay playsinline style="width:100%;display:block"></video>
        <div id="camera-modal-placeholder" style="position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.9rem;background:rgba(0,0,0,0.8)">Connecting…</div>
      </div>
      <div class="actions" style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
        <button class="secondary" onclick="closeCameraModal()">Close</button>
        <a id="camera-modal-open-go2rtc" href="#" target="_blank" rel="noopener" style="font-size:0.85rem;color:var(--accent)">Open in go2rtc</a>
      </div>
    </div>
  </div>

  <div id="chart-modal" class="modal">
    <div class="modal-content">
      <h3 id="chart-title">History</h3>
      <div class="chart-container"><canvas id="history-chart"></canvas></div>
      <button class="toggle-btn" style="margin-top:12px" onclick="document.getElementById('chart-modal').classList.remove('open')">Close</button>
    </div>
  </div>

  <script>
    let token = localStorage.getItem('iot_token');
    const API = '/api';

    async function api(method, path, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (token) opts.headers['Authorization'] = 'Bearer ' + token;
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(API + path, opts);
      if (r.status === 401) { token = null; localStorage.removeItem('iot_token'); showLogin(); return null; }
      const data = await r.json().catch(() => null);
      return r.ok ? data : (data || { detail: 'Request failed' });
    }

    function showLogin() {
      document.getElementById('login-screen').style.display = 'block';
      document.getElementById('app').style.display = 'none';
    }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadAll();
    }

    document.getElementById('login-btn').onclick = async () => {
      const user = document.getElementById('login-user').value;
      const pass = document.getElementById('login-pass').value;
      const err = document.getElementById('login-err');
      const r = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await r.json();
      if (data.access_token) {
        token = data.access_token;
        localStorage.setItem('iot_token', token);
        err.style.display = 'none';
        showApp();
      } else {
        err.textContent = data.detail || 'Login failed';
        err.style.display = 'block';
      }
    };

    document.getElementById('logout-btn').onclick = () => {
      token = null;
      localStorage.removeItem('iot_token');
      showLogin();
    };

    async function loadDevices() {
      const data = await api('GET', '/devices');
      return Array.isArray(data) ? data : [];
    }

    async function loadCameras() {
      const data = await api('GET', '/cameras/streams');
      return (data && data.streams) || [];
    }

    let cameraGridPage = 1;
    const cameraGridPerPage = 16;
    const MODAL_KEY = '__modal';
    const activePeers = {};

    function waitForIceGathering(pc) {
      return new Promise((resolve) => {
        if (pc.iceGatheringState === 'complete') return resolve();
        pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
      });
    }

    function closeGridPeers() {
      Object.entries(activePeers).forEach(([key, pc]) => {
        if (key !== MODAL_KEY) {
          try { pc.close(); } catch (_) {}
          delete activePeers[key];
        }
      });
    }

    async function startWebRTC(streamName, videoElement, placeholderEl, isModal) {
      if (!streamName || !videoElement) return;
      if (isModal) {
        if (activePeers[MODAL_KEY]) {
          try { activePeers[MODAL_KEY].close(); } catch (_) {}
          delete activePeers[MODAL_KEY];
        }
      } else {
        if (activePeers[streamName]) return;
        closeGridPeers();
      }

      const pc = new RTCPeerConnection();
      activePeers[isModal ? MODAL_KEY : streamName] = pc;

      if (placeholderEl) {
        placeholderEl.style.display = 'flex';
        placeholderEl.textContent = 'Connecting…';
      }
      videoElement.onerror = () => {
        if (placeholderEl) { placeholderEl.textContent = 'Stream unavailable'; placeholderEl.style.display = 'flex'; }
      };
      videoElement.onplaying = () => { if (placeholderEl) placeholderEl.style.display = 'none'; };
      pc.ontrack = (event) => {
        videoElement.srcObject = event.streams[0];
      };
      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'failed' && placeholderEl) { placeholderEl.textContent = 'Offline'; placeholderEl.style.display = 'flex'; }
        if (pc.connectionState === 'closed' || pc.connectionState === 'failed') {
          const key = isModal ? MODAL_KEY : streamName;
          if (activePeers[key] === pc) delete activePeers[key];
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitForIceGathering(pc);
      const response = await fetch(
        `/api/cameras/go2rtc-proxy/api/webrtc?src=${encodeURIComponent(streamName)}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/sdp' },
          body: pc.localDescription.sdp
        }
      );
      if (!response.ok) throw new Error('WebRTC handshake failed');
      const answerSDP = await response.text();
      await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answerSDP }));
    }

    let go2rtcUrl = '';

    async function loadNvrCamerasGrid(page) {
      const data = await api('GET', `/cameras/nvr-cameras?page=${page}&per_page=${cameraGridPerPage}`);
      if (!data) return;
      if (data.go2rtc_url) go2rtcUrl = data.go2rtc_url.replace(/\/$/, '');
      renderNvrCameraTiles(data.items || []);
      renderCameraPagination(data);
    }

    function renderNvrCameraTiles(cameras) {
      const grid = document.getElementById('nvr-cameras-grid');
      if (!grid) {
        console.error('Visible NVR grid container (#nvr-cameras-grid) not found');
        return;
      }
      closeGridPeers();
      grid.innerHTML = '';

      if (!cameras || !cameras.length) {
        const empty = document.createElement('p');
        empty.style.cssText = 'grid-column:1/-1;color:var(--muted);padding:24px';
        empty.textContent = 'No NVR cameras. Add an NVR in the Dahua NVR section below.';
        grid.appendChild(empty);
        return;
      }

      cameras.forEach((cam) => {
        const tile = document.createElement('div');
        tile.className = 'nvr-camera-card';
        tile.dataset.streamName = cam.stream_name || '';

        const video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = true;
        video.setAttribute('playsinline', '');
        video.setAttribute('muted', '');
        video.style.width = '100%';
        video.style.height = '100%';
        video.style.objectFit = 'cover';

        tile.appendChild(video);
        grid.appendChild(tile);
      });
    }

    document.addEventListener('click', async function (e) {
      const tile = e.target.closest('.nvr-camera-card');
      if (!tile) return;
      const streamName = tile.dataset.streamName;
      const video = tile.querySelector('video');
      if (!streamName || !video) return;
      await startWebRTC(streamName, video);
    });

    function renderCameraPagination(data) {
      const pag = document.getElementById('camera-pagination');
      if (!pag || !data) return;
      const pages = data.pages || 1;
      const page = data.page || 1;
      const total = data.total || 0;
      if (total === 0) { pag.innerHTML = ''; return; }
      pag.innerHTML = `
        <button ${page <= 1 ? 'disabled' : ''} onclick="cameraGridPage=Math.max(1,cameraGridPage-1);loadNvrCamerasGrid(cameraGridPage)">Prev</button>
        <span>Page ${page} of ${pages} (${total} cameras)</span>
        <button ${page >= pages ? 'disabled' : ''} onclick="cameraGridPage=Math.min(${pages},cameraGridPage+1);loadNvrCamerasGrid(cameraGridPage)">Next</button>
      `;
    }

    async function openCameraModal(streamName, name) {
      const modal = document.getElementById('camera-modal');
      const video = document.getElementById('camera-modal-video');
      const title = document.getElementById('camera-modal-title');
      const placeholder = document.getElementById('camera-modal-placeholder');
      if (!modal || !video) return;
      title.textContent = name || 'Camera';
      if (activePeers[MODAL_KEY]) { try { activePeers[MODAL_KEY].close(); } catch (_) {} delete activePeers[MODAL_KEY]; }
      video.srcObject = null;
      video.src = '';
      if (placeholder) { placeholder.textContent = 'Connecting…'; placeholder.style.display = 'flex'; }
      const openGo2rtcLink = document.getElementById('camera-modal-open-go2rtc');
      if (openGo2rtcLink) {
        openGo2rtcLink.href = go2rtcUrl ? `${go2rtcUrl}/api/stream.html?src=${encodeURIComponent(streamName)}` : '#';
        openGo2rtcLink.style.display = streamName && go2rtcUrl ? 'inline' : 'none';
      }
      modal.classList.add('open');
      if (streamName) {
        try {
          await startWebRTC(streamName, video, placeholder, true);
        } catch (e) {
          console.warn('WebRTC failed:', e);
          if (placeholder) { placeholder.textContent = 'Connection failed'; placeholder.style.display = 'flex'; }
        }
      } else if (placeholder) placeholder.style.display = 'none';
    }

    function closeCameraModal() {
      const modal = document.getElementById('camera-modal');
      const video = document.getElementById('camera-modal-video');
      if (video) { video.pause(); video.srcObject = null; video.src = ''; }
      if (activePeers[MODAL_KEY]) { try { activePeers[MODAL_KEY].close(); } catch (_) {} delete activePeers[MODAL_KEY]; }
      if (modal) modal.classList.remove('open');
    }

    function renderDevices(devices, gridId, types, showChart) {
      const grid = document.getElementById(gridId);
      const filtered = devices.filter(d => types.includes(d.device_type));
      const switchTypes = ['tapo_switch', 'tapo_plug', 'ewelink'];
      grid.innerHTML = filtered.map(d => {
        const isSwitch = switchTypes.includes(d.device_type);
        const isDoor = d.device_type === 'door';
        const isTempSensor = d.device_type === 'temp_sensor' || (d.device_type === 'tapo_h100' && (d.temperature != null || d.humidity != null));
        const nameEsc = (d.name || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        let controlHtml = '';
        if (isSwitch) {
          controlHtml = `
            <div class="card-actions">
              <button class="toggle-btn ${d.state === 'on' ? '' : 'off'}" data-id="${d.id}" data-type="${d.device_type}" data-action="on">ON</button>
              <button class="toggle-btn ${d.state === 'off' ? '' : 'off'}" data-id="${d.id}" data-type="${d.device_type}" data-action="off">OFF</button>
              ${showChart && (d.power != null || d.temperature != null) ? `<button class="toggle-btn secondary" onclick="showHistory(${d.id}, '${nameEsc}')">History</button>` : ''}
              <button class="delete-btn" data-id="${d.id}" data-name="${nameEsc}">Delete</button>
            </div>
          `;
        } else {
          controlHtml = `
            <div class="card-actions">
              ${showChart && (d.temperature != null || d.power != null) ? `<button class="toggle-btn secondary" onclick="showHistory(${d.id}, '${nameEsc}')">History</button>` : ''}
              <button class="delete-btn" data-id="${d.id}" data-name="${nameEsc}">Delete</button>
            </div>
          `;
        }
        const lanBadge = (d.device_type === 'ewelink') ? (d.lan_online ? '<span class="lan-badge lan-online" title="LAN connected">LAN</span>' : '<span class="lan-badge lan-cloud" title="Cloud only">LAN</span>') : '';
        const preferLanToggle = (d.device_type === 'ewelink' && d.ewelink_device_id) ? `
          <label class="prefer-lan-toggle" title="Prefer LAN when available">
            <input type="checkbox" ${d.prefer_lan !== false ? 'checked' : ''} data-eid="${d.ewelink_device_id || ''}">
            <span>Prefer LAN</span>
          </label>
        ` : '';
        return `
        <div class="card" data-id="${d.id}" data-type="${d.device_type}">
          <h3><span class="status ${d.online ? 'online' : 'offline'}"></span>${d.name} ${lanBadge}</h3>
          <div class="meta">${d.device_type} · ${d.source || '-'}${d.lan_ip ? ' · ' + d.lan_ip : ''}</div>
          ${preferLanToggle}
          ${d.temperature != null ? `<div class="value">${d.temperature}°C</div>` : ''}
          ${d.humidity != null ? `<div class="value">${d.humidity}% RH</div>` : ''}
          ${d.power != null ? `<div class="value">${d.power} W</div>` : ''}
          ${d.battery != null ? `<div class="meta">Battery ${d.battery}%</div>` : ''}
          ${isDoor && d.state ? `<div class="door-status ${d.state}">${d.state === 'open' ? 'Open' : 'Closed'}</div>` : ''}
          ${controlHtml}
        </div>
      `;
      }).join('');
      grid.querySelectorAll('.toggle-btn[data-id]').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const dtype = btn.dataset.type;
          const action = btn.dataset.action;
          if (dtype === 'ewelink') {
            const dev = filtered.find(x => x.id == id);
            const eid = dev.ewelink_device_id;
            const turnOn = action === 'on';
            await api('POST', '/ewelink/toggle', { device_id: eid, turn_on: turnOn });
          } else {
            await api('POST', action === 'on' ? `/tapo/${id}/on` : `/tapo/${id}/off`);
          }
          loadAll();
        };
      });
      grid.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const name = btn.dataset.name || 'device';
          if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
          const r = await api('DELETE', `/devices/${id}`);
          if (r && r.deleted) loadAll();
          else alert(r?.detail || 'Delete failed');
        };
      });
      grid.querySelectorAll('.prefer-lan-toggle input').forEach(cb => {
        cb.onchange = async () => {
          const eid = cb.dataset.eid;
          if (!eid) return;
          await api('POST', '/ewelink/prefer-lan', { device_id: eid, prefer_lan: cb.checked });
          loadAll();
        };
      });
    }

    async function showHistory(deviceId, name) {
      const data = await api('GET', `/devices/${deviceId}/history?hours=24`);
      if (!data || !data.length) { alert('No history'); return; }
      document.getElementById('chart-title').textContent = name + ' - 24h';
      const ctx = document.getElementById('history-chart').getContext('2d');
      const labels = data.map(d => new Date(d.timestamp).toLocaleTimeString());
      const datasets = [];
      if (data.some(d => d.temperature != null)) {
        datasets.push({ label: 'Temperature °C', data: data.map(d => d.temperature), borderColor: '#00d4aa', fill: false });
      }
      if (data.some(d => d.humidity != null)) {
        datasets.push({ label: 'Humidity %', data: data.map(d => d.humidity), borderColor: '#4dabf7', fill: false });
      }
      if (data.some(d => d.power != null)) {
        datasets.push({ label: 'Power W', data: data.map(d => d.power), borderColor: '#ff6b6b', fill: false });
      }
      if (datasets.length === 0) { alert('No chart data'); return; }
      if (window.historyChart) window.historyChart.destroy();
      window.historyChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: { responsive: true, maintainAspectRatio: false }
      });
      document.getElementById('chart-modal').classList.add('open');
    }

    async function loadAll() {
      if (!token) return;
      const [devices, streams] = await Promise.all([loadDevices(), loadCameras()]);
      const devList = Array.isArray(devices) ? devices : [];
      const streamList = Array.isArray(streams) ? streams : [];
      renderDevices(devList, 'tapo-grid', ['tapo_h100', 'tapo_switch', 'tapo_plug', 'door', 'temp_sensor'], true);
      renderDevices(devList, 'ewelink-grid', ['ewelink'], true);
      if (typeof renderNvrList === 'function') renderNvrList(devList, api, loadAll);
      loadNvrCamerasGrid(cameraGridPage);
    }

    document.getElementById('tapo-add').onclick = () => document.getElementById('tapo-add-modal').classList.add('open');
    document.getElementById('tapo-add-save').onclick = async () => {
      const ip = document.getElementById('tapo-ip').value.trim();
      const name = document.getElementById('tapo-name').value.trim() || undefined;
      const err = document.getElementById('tapo-add-err');
      const r = await api('POST', '/tapo/add', { ip_address: ip, name });
      if (r && r.id) {
        document.getElementById('tapo-add-modal').classList.remove('open');
        document.getElementById('tapo-ip').value = '';
        document.getElementById('tapo-name').value = '';
        err.style.display = 'none';
        loadAll();
      } else {
        err.textContent = r?.detail || 'Failed to add device';
        err.style.display = 'block';
      }
    };

    document.getElementById('ewelink-connect').onclick = async () => {
      const r = await api('GET', '/ewelink/login-url');
      if (r && r.url) window.open(r.url);
    };

    document.getElementById('ewelink-sync').onclick = async () => {
      await api('POST', '/ewelink/sync');
      loadAll();
    };

    document.getElementById('ewelink-scan-lan').onclick = async () => {
      const btn = document.getElementById('ewelink-scan-lan');
      btn.disabled = true;
      btn.textContent = 'Scanning...';
      try {
        const r = await api('POST', '/ewelink/scan-lan');
        if (r) {
          loadAll();
          if (r.count > 0) btn.textContent = `Scan complete (${r.count} found)`;
          else btn.textContent = 'Scan LAN for Sonoff Devices';
        }
      } finally {
        btn.disabled = false;
        if (btn.textContent === 'Scanning...') btn.textContent = 'Scan LAN for Sonoff Devices';
      }
      setTimeout(() => { if (btn.textContent.includes('found')) btn.textContent = 'Scan LAN for Sonoff Devices'; }, 3000);
    };

    document.getElementById('nvr-add').onclick = () => document.getElementById('nvr-add-modal').classList.add('open');
    document.getElementById('nvr-add-save').onclick = async () => {
      const name = document.getElementById('nvr-name').value.trim();
      const ip = document.getElementById('nvr-ip').value.trim();
      const username = document.getElementById('nvr-username').value.trim();
      const password = document.getElementById('nvr-password').value;
      const channels = parseInt(document.getElementById('nvr-channels').value, 10) || 4;
      const err = document.getElementById('nvr-add-err');
      const btn = document.getElementById('nvr-add-save');
      if (!ip || !username || !password) {
        err.textContent = 'IP, username, and password are required';
        err.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner" style="vertical-align:middle"></span> Adding...';
      err.style.display = 'none';
      const r = await api('POST', '/nvr/add', { name: name || undefined, ip_address: ip, username, password, total_channels: channels });
      btn.disabled = false;
      btn.textContent = 'Add';
      if (r && r.id) {
        document.getElementById('nvr-add-modal').classList.remove('open');
        document.getElementById('nvr-name').value = '';
        document.getElementById('nvr-ip').value = '';
        document.getElementById('nvr-username').value = '';
        document.getElementById('nvr-password').value = '';
        document.getElementById('nvr-channels').value = '4';
        err.style.display = 'none';
        loadAll();
      } else {
        err.textContent = r?.detail || 'Failed to add NVR';
        err.style.display = 'block';
      }
    };

    // WebSocket
    let ws;
    function connectWs() {
      if (!token) return;
      ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws?token=${token}`);
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'device' || msg.type === 'device_update') loadAll();
        } catch (_) {}
      };
      ws.onclose = () => setTimeout(connectWs, 3000);
    }
    connectWs();

    if (token) showApp();
    else showLogin();

    // Show eWeLink OAuth result
    const params = new URLSearchParams(location.search);
    if (params.get('ewelink') === 'success') {
      alert('eWeLink connected! Click Sync to load devices.');
      history.replaceState({}, '', '/');
    } else if (params.get('ewelink') === 'error') {
      alert('eWeLink error: ' + (params.get('msg') || 'Unknown'));
      history.replaceState({}, '', '/');
    }
  </script>
</body>
</html>
